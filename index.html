<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Comercial — Coopefarma</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{height:64px;object-fit:contain;margin-bottom:20px}
h1{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:#1a1a2e;text-align:center}
.sub{color:#64748b;font-size:14px;margin:6px 0 36px;text-align:center}
.grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:560px}
.tile{background:#fff;border-radius:14px;padding:30px 26px;width:220px;text-align:center;text-decoration:none;
  color:#1a1a2e;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .2s;border:2px solid transparent}
.tile:hover{border-color:#15a563;transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
.tile .icon{font-size:36px;display:block;margin-bottom:12px}
.tile .titulo{font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;color:#1a1a2e;margin-bottom:4px}
.tile .desc{font-size:12px;color:#64748b}
footer{margin-top:48px;font-size:11px;color:#aaa}
</style>
</head>
<body>
  <img class="logo" src="https://raw.githubusercontent.com/coopefarma/portal-cotacao/main/Coopefarma_Marca_1.jpg" alt="Coopefarma"/>
  <h1>Comercial Coopefarma</h1>
  <div class="sub">Escolha o que deseja acessar</div>
  <div class="grid">
    <a class="tile" href="compra-coletiva.html">
      <span class="icon">🛒</span>
      <div class="titulo">Compra Coletiva</div>
      <div class="desc">Campanhas, produtos e pedidos dos associados</div>
    </a>
    <a class="tile" href="formulario.html">
      <span class="icon">📄</span>
      <div class="titulo">Formulário</div>
      <div class="desc">Questionário de prospecção de novos associados</div>
    </a>
  </div>
  <footer>Coopefarma</footer>
</body>
</html>
